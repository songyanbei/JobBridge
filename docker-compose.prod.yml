# ============================================================================
# JobBridge 生产部署
# 启动: docker compose -f docker-compose.prod.yml up -d --build
# ============================================================================
# 四容器架构:
#   nginx      → 80 端口对外，反代 app + 托管前端静态文件
#   app        → 8000 端口（内部），Python 业务服务
#   mysql      → 3306 端口（内部），不暴露到宿主机
#   redis      → 6379 端口（内部），不暴露到宿主机
#
# 首次部署：
#   1. cp .env.example .env   → 填入真实配置
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. 首次启动后手动导入数据库：
#      docker exec -i jobbridge-mysql mysql -u root -pROOT_PASSWORD jobbridge < sql/schema.sql
#      docker exec -i jobbridge-mysql mysql -u root -pROOT_PASSWORD jobbridge < sql/seed.sql
#      docker exec -i jobbridge-mysql mysql -u root -pROOT_PASSWORD jobbridge < sql/seed_cities_full.sql
#   4. 替换 admin 默认密码
#   5. curl http://YOUR_IP/health  → 验证
#
# 更新代码：
#   docker compose -f docker-compose.prod.yml build app
#   docker compose -f docker-compose.prod.yml up -d app
# ============================================================================

services:
  # ---- 反向代理 + 前端静态文件 ----
  nginx:
    image: nginx:1.25-alpine
    container_name: jobbridge-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 运营后台前端 build 产物（Vue 3 dist）
      # 前端构建后 dist/ 在 frontend/dist/
      - ./frontend/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ---- Python 业务服务 ----
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobbridge-app
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - app_uploads:/data/uploads
      - app_logs:/data/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.json()['db']['ok']"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: jobbridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-jobbridge}
      MYSQL_USER: ${DB_USER:-jobbridge}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jobbridge}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+08:00
      --explicit_defaults_for_timestamp=1
      --max_connections=100
      --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 生产环境不暴露端口到宿主机
    # ports:
    #   - "3306:3306"

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: jobbridge-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # 生产环境不暴露端口到宿主机
    # ports:
    #   - "6379:6379"

  # ---- 企微消息异步 Worker（Phase 4） ----
  # 独立进程，消费 queue:incoming、queue:send_retry
  # 可通过 `docker compose -f docker-compose.prod.yml up -d --scale worker=N` 横向扩展
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.services.worker
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - app_uploads:/data/uploads
      - app_logs:/data/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  app_uploads:
  app_logs:
