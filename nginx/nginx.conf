# ============================================================================
# JobBridge nginx 配置（Phase 7 §3.1 模块 G 修复）
#
# 核心修复：
#   1. /admin/* 同时承载 SPA 和 Admin API：按 Accept + method 分流。
#      API 请求（Accept: application/json 或非 GET/HEAD）→ 代理到 app。
#      其余 → 静态文件 + SPA fallback。
#   2. 所有 proxy_pass / proxy_set_header 放在 named location（@admin_api），
#      if 块里仅 return 418 触发 error_page 内部跳转——避开 nginx 官方不推荐的
#      "if + proxy directive" 组合。
#   3. 前置条件：frontend/vite.config.js 已设置 base: '/admin/'，dist/ 内
#      index.html 引用 /admin/assets/*.js 才能被 location /admin/ 命中。
# ============================================================================

# Accept: application/json → API 请求
map $http_accept $admin_is_api {
    default              0;
    "~*application/json" 1;
}

server {
    listen 80;
    server_name _;
    charset utf-8;

    # 上传文件大小限制（5 张图 x 1MB + 文字）
    client_max_body_size 10m;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain;

    # 健康检查（给 docker healthcheck 用）
    location = /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # /admin/*  → SPA 静态 + Admin API 共存
    # 规则：
    #   - 非 GET/HEAD（POST/PUT/PATCH/DELETE）→ API
    #   - Accept: application/json → API（xhr/axios）
    #   - 其余（浏览器直接访问 HTML）→ 静态 + SPA fallback
    # -----------------------------------------------------------------------
    location /admin/ {
        error_page 418 = @admin_api;
        recursive_error_pages on;

        # if 块内只放 return，不放 proxy_*
        if ($request_method !~ ^(GET|HEAD)$) { return 418; }
        if ($admin_is_api = 1)               { return 418; }

        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 用户输入 /admin 不带尾斜杠时重定向
    location = /admin { return 302 /admin/; }

    # Admin API 代理（named location）
    location @admin_api {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------------------
    # 其它路径：webhook / events / health / files 等都反代到 app
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM 调用可能耗时较长
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # 生产 HTTPS 证书挂载示例（由运维按 §14.5 补齐）：
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
}
