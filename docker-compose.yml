# ============================================================================
# JobBridge 本地开发基础设施
# 使用: docker compose up -d
# ============================================================================
# 启动后：
#   MySQL 首次启动会自动执行 sql/ 目录下的 .sql 文件（按文件名顺序）：
#     1. schema.sql              (建表)
#     2. seed.sql                (工种字典 + 系统配置 + 默认管理员)
#     3. seed_cities_full.sql    (342 条全国地级行政区)
#
#   默认管理员账号 / 密码: admin / admin123  （生产部署前必改）
#   MySQL root 密码:        root
#   业务数据库账号:         jobbridge / jobbridge
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: jobbridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobbridge
      MYSQL_USER: jobbridge
      MYSQL_PASSWORD: jobbridge
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+08:00
      --explicit_defaults_for_timestamp=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- 企微消息异步 Worker（Phase 4） ----
  # 独立进程，消费 queue:incoming、queue:send_retry
  # 手动启动：docker compose up -d worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobbridge-worker
    command: python -m app.services.worker
    env_file:
      - ./.env
    environment:
      - APP_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - worker_uploads:/app/uploads
    restart: unless-stopped
    # Worker 纯后台消费，不对外暴露端口

volumes:
  mysql_data:
  redis_data:
  worker_uploads:
